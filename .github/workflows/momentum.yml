name: Momentum C25

on:
  schedule:
    - cron: '0 16 * * 5'   # fredag kl 18 dansk tid
  workflow_dispatch:       # manuel test-knap

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Installer pakker
        run: pip install yfinance pandas

      # ✅ KRITISK FIX (her var din fejl)
      - name: Kør momentum script
        env:
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python momentum.py
