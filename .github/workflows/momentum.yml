name: Momentum C25

on:
  schedule:
    - cron: '0 16 * * 5'   # Fredag kl 18 dansk tid
  workflow_dispatch:       # Gør at du kan trykke "Run workflow"

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      # ✅ Hent repo
      - name: Checkout kode
        uses: actions/checkout@v3

      # ✅ Installer Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # ✅ Installer pakker
      - name: Install dependencies
        run: |
          pip install yfinance pandas

      # ✅ Kør dit script (VIGTIGT: env her!)
      - name: Kør momentum script
        env:
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python momentum12uger.py
